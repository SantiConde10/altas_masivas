<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'">
  <title>GAIA - Automatización</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="panels/home/home.css">
  <link rel="stylesheet" href="panels/alta-masiva/alta-masiva.css">
  <link rel="stylesheet" href="panels/tareas/tareas.css">
  <link rel="stylesheet" href="panels/reportes/reportes.css">
</head>
<body>
  
  <!-- Splash / Hero Screen -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-content">
      <img src="assets/LogotipoGAIA_black.png" alt="GAIA Logo" class="splash-logo">
      <p class="splash-subtitle">AUTOMATION</p>
      <div class="splash-loader">
        <div class="loader-progress"></div>
      </div>
      <p class="splash-slogan">DISEÑO PARA LA VIDA REAL</p>
    </div>
  </div>

  <!-- Main App Layout -->
  <div class="app-layout" id="app-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="assets/LogotipoGAIA_black.png" alt="GAIA Logo" class="brand-logo">
      </div>
      
      <nav class="sidebar-nav">
        <ul class="nav-list">
          <li class="nav-item">
            <button class="nav-btn active" data-target="home-view">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
              <span>Inicio</span>
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-btn" data-target="alta-masiva-view">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              <span>SKU Upload</span>
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-btn" data-target="tareas-view">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
              <span>Tareas</span>
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-btn" data-target="reportes-view">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              <span>Reportes</span>
            </button>
          </li>
        </ul>
      </nav>
      
      <div class="sidebar-footer">
        <p class="version">v1.0.0</p>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-area">
      
      <!-- Vista de Inicio (Home) -->
      <section id="home-view" class="view-section active">
        <!-- Cargado dinámicamente -->
      </section>
      
      <!-- Vista de SKU Upload -->
      <section id="alta-masiva-view" class="view-section">
        <!-- Cargado dinámicamente -->
      </section>

      <!-- Vista de Tareas -->
      <section id="tareas-view" class="view-section">
        <!-- Cargado dinámicamente -->
      </section>

      <!-- Vista de Reportes -->
      <section id="reportes-view" class="view-section">
        <!-- Cargado dinámicamente -->
      </section>

    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
